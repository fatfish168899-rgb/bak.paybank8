<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>收银台 - 正在安全连接...</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 极致精简版加载样式 */
        body { background: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: system-ui, sans-serif; }
        .spin-box { text-align: center; padding: 2rem; background: white; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div id="app" class="container">
        <div class="spin-box">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3 text-muted">正在进行金融安全环境检测...</p>
            <div id="debug-log" style="font-size: 10px; color: #ccc; margin-top: 10px;"></div>
        </div>
    </div>

    <!-- 所有的关键库强制使用 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

    <script>
        // [V37.0 THE FINAL STAND]
        window.PB_DEBUG = function(msg) { console.log("[PB-V37]", msg); document.getElementById('debug-log').innerText += msg + "\n"; };
        
        async function fetchOrder() {
            const urlParams = new URLSearchParams(window.location.search);
            const ono = urlParams.get('order_no');
            const token = urlParams.get('token');
            const upstream = 'https://bak.paybank8.com';
            
            // 尝试三种路径：1. 同域 XHR 2. 同域 Fetch 3. 源站直连 
            const endpoints = [
                location.origin + '/api/get_order_details.php?order_no=' + ono + '&token=' + token,
                upstream + '/api/get_order_details.php?order_no=' + ono + '&token=' + token
            ];

            for (let url of endpoints) {
                try {
                    window.PB_DEBUG("Trying: " + url.split('?')[0]);
                    const res = await fetch(url, { cache: 'no-store' });
                    if (res.ok) {
                        const json = await res.json();
                        if (json.code === 200) {
                            window.PB_DEBUG("SUCCESS!");
                            // 这里是简化的渲染逻辑，实际应当调用完整的 checkout.js 渲染引擎
                            // 为了止血，我们先确认接口能通过单文件访问成功
                            alert("成功连接！接口返回订单号：" + json.data.order_no);
                            return;
                        }
                    }
                } catch (e) {
                    window.PB_DEBUG("Failed: " + e.message);
                }
            }
            alert("抱歉，您的浏览器环境仍然拦截了安全连接。请尝试：\n1. 关闭所有拦截插件\n2. 关闭浏览器“增强追踪保护”\n3. 换个浏览器访问");
        }

        if (window.location.search.includes('order_no')) {
            fetchOrder();
        } else {
            document.body.innerHTML = "<h1>缺少订单号参数</h1>";
        }
    </script>
</body>
</html>
